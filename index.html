<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#2f5cff" />
  <title>Mini Task (Mobile)</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", sans-serif;
      background: #f6f7fb;
      color: #111;
    }
    .wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 16px;
    }
    .card {
      background: #fff;
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .06);
    }
    h1 {
      font-size: 18px;
      margin: 0 0 12px;
    }
    .row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    textarea,
    select {
      font-size: 16px;
      border-radius: 14px;
      border: 1px solid #e4e6ef;
      outline: none;
      line-height: 1.3;
      background: #fff;
      color: #111;
    }
    textarea {
      flex: 1;
      padding: 14px;
      resize: none;
    }
    select {
      padding: 0 12px;
      min-width: 92px;
    }
    textarea:focus,
    select:focus {
      border-color: #b7c5ff;
      box-shadow: 0 0 0 4px rgba(90, 120, 255, .12);
    }
    button {
      font-size: 16px;
      padding: 14px 16px;
      border: 0;
      border-radius: 14px;
      background: #2f5cff;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
    }
    button:active {
      transform: translateY(1px);
    }
    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }
    .voice {
      background: #0f766e;
    }
    .voice.listening {
      background: #b42318;
    }
    .voice-status {
      margin-top: 8px;
      font-size: 13px;
      color: #0f766e;
      min-height: 1.2em;
    }
    .bucket-picker {
      margin-top: 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: #4b5563;
      font-size: 13px;
    }
    .bucket-picker select {
      min-width: 110px;
      height: 42px;
    }
    .entry-picker {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      font-size: 13px;
      color: #444;
      flex-wrap: wrap;
    }
    .section {
      margin-top: 18px;
    }
    .section:first-of-type {
      margin-top: 14px;
    }
    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 700;
      color: #5b6477;
      letter-spacing: .02em;
    }
    .section-title span:last-child {
      font-weight: 600;
      color: #8a93a5;
    }
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #eef0f6;
      background: #fbfbfe;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .task-content {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .check-wrap {
      display: flex;
      align-items: center;
      padding-top: 2px;
    }
    .check-toggle {
      width: 22px;
      height: 22px;
      margin: 0;
      accent-color: #2f5cff;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .task-main {
      flex: 1;
      min-width: 0;
    }
    .text {
      font-size: 16px;
      line-height: 1.3;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .done .text {
      text-decoration: line-through;
      opacity: .55;
    }
    .task-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      flex-wrap: wrap;
    }
    .bucket-move {
      appearance: none;
      -webkit-appearance: none;
      min-width: 84px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid #dde3f0;
      background: #fff;
      color: #4a5670;
      font-size: 13px;
      padding: 0 10px;
    }
    .kind-chip {
      display: inline-flex;
      align-items: center;
      height: 34px;
      padding: 0 10px;
      border-radius: 10px;
      background: #f1f4fb;
      color: #6a7488;
      font-size: 12px;
      font-weight: 700;
    }
    .actions {
      display: flex;
      gap: 8px;
      align-self: flex-start;
    }
    .ghost {
      background: #eef1ff;
      color: #2f5cff;
      font-weight: 700;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
    }
    .danger {
      background: #ffecec;
      color: #cc1f1a;
      font-weight: 800;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
    }
    .empty {
      padding: 14px;
      border-radius: 14px;
      border: 1px dashed #dbe1ed;
      background: #fafbff;
      color: #8a93a5;
      font-size: 14px;
      text-align: center;
    }
    .bottom-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .mini {
      background: #111;
    }
    @media (max-width: 520px) {
      .row {
        flex-direction: column;
      }
      .row button,
      .row select {
        width: 100%;
      }
      li {
        flex-direction: column;
        align-items: stretch;
      }
      .task-content {
        width: 100%;
      }
      .actions {
        align-self: stretch;
      }
      .actions button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>📝 Mini Task</h1>

      <div class="row">
        <textarea id="taskInput" rows="2" placeholder="タスクを書く（例：メールを3通だけ返す）"></textarea>
        <button id="voiceBtn" class="voice" type="button">音声入力</button>
        <button id="addBtn" type="button">追加</button>
      </div>

      <div class="bucket-picker">
        <div class="entry-picker">
          <label for="kindInput">種類</label>
          <select id="kindInput">
            <option value="task">チェック付き</option>
            <option value="note">メモ</option>
          </select>
        </div>
        <div class="entry-picker">
          <label for="bucketInput">追加先</label>
          <select id="bucketInput">
            <option value="today">今日</option>
            <option value="week">今週</option>
            <option value="later">いつか</option>
          </select>
        </div>
      </div>

      <div id="voiceStatus" class="voice-status"></div>

      <div class="bar">
        <div id="count">0件</div>
      </div>

      <div id="taskList"></div>

      <div class="bottom-actions">
        <button class="ghost" id="exportDoneBtn" type="button">完了をCSV</button>
        <button class="ghost" id="clearDoneBtn" type="button">完了を削除</button>
        <button class="mini" id="clearAllBtn" type="button">全部削除</button>
      </div>
    </div>
  </div>

  <script>
    const KEY = "mini_task_v1";
    const BUCKETS = ["today", "week", "later"];
    const DEFAULT_BUCKET = "today";
    const KINDS = ["task", "note"];
    const DEFAULT_KIND = "task";
    const BUCKET_LABELS = {
      today: "今日",
      week: "今週",
      later: "いつか"
    };
    const KIND_LABELS = {
      task: "チェック付き",
      note: "メモ"
    };

    const input = document.getElementById("taskInput");
    const kindInput = document.getElementById("kindInput");
    const bucketInput = document.getElementById("bucketInput");
    const list = document.getElementById("taskList");
    const count = document.getElementById("count");
    const addBtn = document.getElementById("addBtn");
    const voiceBtn = document.getElementById("voiceBtn");
    const voiceStatus = document.getElementById("voiceStatus");
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let listening = false;
    let voiceText = "";

    function normalizeBucket(bucket) {
      return BUCKETS.includes(bucket) ? bucket : DEFAULT_BUCKET;
    }

    function normalizeKind(kind) {
      return KINDS.includes(kind) ? kind : DEFAULT_KIND;
    }

    function bucketLabel(bucket) {
      return BUCKET_LABELS[normalizeBucket(bucket)];
    }

    function kindLabel(kind) {
      return KIND_LABELS[normalizeKind(kind)];
    }

    function normalizeTask(task) {
      return {
        text: typeof task?.text === "string" ? task.text : "",
        done: Boolean(task?.done),
        ts: Number.isFinite(task?.ts) ? task.ts : Date.now(),
        bucket: normalizeBucket(task?.bucket),
        kind: normalizeKind(task?.kind)
      };
    }

    function load() {
      try {
        const raw = JSON.parse(localStorage.getItem(KEY));
        if (!Array.isArray(raw)) return [];

        let migrated = false;
        const tasks = raw
          .map((task) => {
            const normalized = normalizeTask(task);
            if (
              normalized.text !== task?.text ||
              normalized.done !== Boolean(task?.done) ||
              normalized.ts !== task?.ts ||
              normalized.bucket !== task?.bucket ||
              normalized.kind !== task?.kind
            ) {
              migrated = true;
            }
            return normalized;
          })
          .filter((task) => task.text.trim() !== "");

        if (tasks.length !== raw.length) migrated = true;
        if (migrated) save(tasks);
        return tasks;
      } catch {
        return [];
      }
    }

    function save(tasks) {
      localStorage.setItem(KEY, JSON.stringify(tasks));
    }

    function escapeHtml(str) {
      return String(str).replace(/[&<>"']/g, (s) => (
        { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[s]
      ));
    }

    function bucketOptions(selected) {
      return BUCKETS.map((bucket) => (
        `<option value="${bucket}"${bucket === selected ? " selected" : ""}>${bucketLabel(bucket)}</option>`
      )).join("");
    }

    function renderSection(bucket, tasks) {
      const section = document.createElement("section");
      section.className = "section";

      const title = document.createElement("div");
      title.className = "section-title";
      title.innerHTML = `<span>${bucketLabel(bucket)}</span><span>${tasks.length}件</span>`;
      section.appendChild(title);

      if (tasks.length === 0) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "タスクはありません";
        section.appendChild(empty);
        return section;
      }

      const ul = document.createElement("ul");
      tasks.forEach(({ task, index }) => {
        const li = document.createElement("li");
        li.className = task.done && task.kind === "task" ? "done" : "";
        li.innerHTML = `
          <div class="task-content">
            ${task.kind === "task" ? `
              <label class="check-wrap" aria-label="完了状態の切り替え">
                <input class="check-toggle" data-act="toggle-check" data-idx="${index}" type="checkbox"${task.done ? " checked" : ""} />
              </label>
            ` : ""}
            <div class="task-main">
              <div class="text">${escapeHtml(task.text)}</div>
              <div class="task-meta">
                <span class="kind-chip">${kindLabel(task.kind)}</span>
                <select class="bucket-move" data-act="bucket" data-idx="${index}" aria-label="bucketの変更">
                  ${bucketOptions(task.bucket)}
                </select>
              </div>
            </div>
          </div>
          <div class="actions">
            <button class="danger" data-act="del" data-idx="${index}" type="button">削除</button>
          </div>
        `;

        li.addEventListener("click", (event) => {
          const interactive = event.target.closest("button, select, input");
          if (interactive) return;
          if (task.kind !== "task") return;
          toggle(index);
        });

        ul.appendChild(li);
      });

      section.appendChild(ul);
      return section;
    }

    function render() {
      const tasks = load();
      list.innerHTML = "";

      BUCKETS.forEach((bucket) => {
        const grouped = tasks
          .map((task, index) => ({ task, index }))
          .filter((entry) => entry.task.bucket === bucket);
        list.appendChild(renderSection(bucket, grouped));
      });

      const total = tasks.length;
      const done = tasks.filter((task) => task.kind === "task" && task.done).length;
      const todayOpen = tasks.filter((task) => task.kind === "task" && task.bucket === "today" && !task.done).length;
      count.textContent = `${total}件（完了 ${done} / 今日 ${todayOpen}）`;
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) return;

      const tasks = load();
      tasks.unshift({
        text,
        done: false,
        ts: Date.now(),
        bucket: normalizeBucket(bucketInput.value),
        kind: normalizeKind(kindInput.value)
      });
      save(tasks);

      input.value = "";
      input.focus();
      render();
    }

    function joinTexts(base, addition) {
      const a = base.trim();
      const b = addition.trim();
      if (!a) return b;
      if (!b) return a;
      return `${a} ${b}`;
    }

    function setVoiceStatus(message, isError = false) {
      voiceStatus.textContent = message;
      voiceStatus.style.color = isError ? "#b42318" : "#0f766e";
    }

    function updateVoiceButton() {
      if (!SpeechRecognition) {
        voiceBtn.disabled = true;
        voiceBtn.classList.remove("listening");
        setVoiceStatus("このブラウザは音声入力に対応していません。", true);
        return;
      }
      voiceBtn.disabled = false;
      voiceBtn.classList.toggle("listening", listening);
      voiceBtn.textContent = listening ? "停止" : "音声入力";
      if (!listening && !voiceStatus.textContent) {
        setVoiceStatus("マイクを押して話してください。");
      }
    }

    function setupVoiceInput() {
      if (!SpeechRecognition) {
        updateVoiceButton();
        return;
      }

      recognition = new SpeechRecognition();
      recognition.lang = "ja-JP";
      recognition.interimResults = true;
      recognition.continuous = false;

      recognition.addEventListener("start", () => {
        listening = true;
        voiceText = input.value.trim();
        updateVoiceButton();
        setVoiceStatus("聞き取り中...");
      });

      recognition.addEventListener("result", (event) => {
        let finalPart = "";
        let interimPart = "";
        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          const transcript = event.results[i][0]?.transcript ?? "";
          if (event.results[i].isFinal) finalPart += transcript;
          else interimPart += transcript;
        }
        if (finalPart) voiceText = joinTexts(voiceText, finalPart);
        input.value = joinTexts(voiceText, interimPart);
      });

      recognition.addEventListener("error", (event) => {
        if (event.error === "not-allowed") {
          setVoiceStatus("マイク権限が拒否されました。ブラウザ設定を確認してください。", true);
        } else if (event.error === "no-speech") {
          setVoiceStatus("音声を認識できませんでした。もう一度お試しください。", true);
        } else {
          setVoiceStatus(`音声入力でエラーが発生しました: ${event.error}`, true);
        }
      });

      recognition.addEventListener("end", () => {
        listening = false;
        updateVoiceButton();
        if (!voiceStatus.textContent || voiceStatus.textContent === "聞き取り中...") {
          setVoiceStatus("音声入力を終了しました。必要なら「追加」を押してください。");
        }
        input.focus();
      });

      voiceBtn.addEventListener("click", () => {
        if (listening) {
          recognition.stop();
          return;
        }
        try {
          recognition.start();
        } catch {
          setVoiceStatus("音声入力を開始できませんでした。少し待って再試行してください。", true);
        }
      });

      updateVoiceButton();
    }

    function toggle(idx) {
      const tasks = load();
      if (!tasks[idx]) return;
      if (tasks[idx].kind !== "task") return;
      tasks[idx].done = !tasks[idx].done;
      save(tasks);
      render();
    }

    function del(idx) {
      const tasks = load();
      tasks.splice(idx, 1);
      save(tasks);
      render();
    }

    function moveBucket(idx, bucket) {
      const tasks = load();
      if (!tasks[idx]) return;
      tasks[idx].bucket = normalizeBucket(bucket);
      save(tasks);
      render();
    }

    function clearDone() {
      const tasks = load().filter((task) => !(task.kind === "task" && task.done));
      save(tasks);
      render();
    }

    function clearAll() {
      save([]);
      render();
    }

    function toCsvCell(value) {
      const text = String(value ?? "");
      return `"${text.replace(/"/g, "\"\"")}"`;
    }

    function exportDoneCsv() {
      const doneTasks = load().filter((task) => task.kind === "task" && task.done);
      if (doneTasks.length === 0) {
        setVoiceStatus("完了タスクがないため、CSVを出力しませんでした。", true);
        return;
      }

      const header = ["task", "kind", "bucket", "created_at_iso", "done"];
      const rows = doneTasks.map((task) => [
        task.text,
        kindLabel(task.kind),
        bucketLabel(task.bucket),
        new Date(task.ts).toISOString(),
        "true"
      ]);
      const csv = [header, ...rows]
        .map((cols) => cols.map(toCsvCell).join(","))
        .join("\n");

      const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      const ymd = new Date().toISOString().slice(0, 10);
      a.href = url;
      a.download = `mini-task-done-${ymd}.csv`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);

      setVoiceStatus(`${doneTasks.length}件の完了タスクをCSV出力しました。`);
    }

    addBtn.addEventListener("click", addTask);

    document.addEventListener("click", (event) => {
      const btn = event.target.closest("button");
      if (!btn) return;

      const act = btn.dataset.act;
      if (!act) return;

      const idx = Number(btn.dataset.idx);
      if (act === "toggle") toggle(idx);
      if (act === "del") del(idx);
    });

    document.addEventListener("change", (event) => {
      const checkbox = event.target.closest("input[data-act='toggle-check']");
      if (checkbox) {
        toggle(Number(checkbox.dataset.idx));
        return;
      }

      const select = event.target.closest("select[data-act='bucket']");
      if (!select) return;
      moveBucket(Number(select.dataset.idx), select.value);
    });

    document.getElementById("clearDoneBtn").addEventListener("click", clearDone);
    document.getElementById("clearAllBtn").addEventListener("click", clearAll);
    document.getElementById("exportDoneBtn").addEventListener("click", exportDoneCsv);

    setupVoiceInput();
    render();
  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js");
      });
    }
  </script>
</body>
</html>
